# nginx.conf
server {
    listen 80;
    server_name localhost;

    # Set the root directory for serving static files
    root /usr/share/nginx/html;
    index index.html index.htm;

    # Try serving the file directly, then fallback to index.html for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the backend service
    # The 'backend' is the service name defined in docker-compose.yml
    location /api/ {
        proxy_pass http://backend:5000/api/; # Ensure this matches your backend API base path
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Optional: Serve specific assets with appropriate MIME types and caching headers
    location ~* \.(js|css|png|jpg|jpeg|gif|ico)$ {
        expires 1y;
        log_not_found off;
        add_header Cache-Control "public";
    }

    # Optional: Gzip compression for better performance
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
}
